strategies:
  MomentumEOD:
    top_n: 5
    symbols:
      - AAPL
      - GOOGL
      - MSFT
      - AMZN
      - TSLA
      - SPY

  MeanReversion1m:
    rsi_period: 14
    oversold_threshold: 30.0
    overbought_threshold: 70.0
    symbols:
      - SPY
      - QQQ
      - AAPL

  DualThrust:
    lookback_period: 5
    k_value: 0.5
    symbols:
      - ES
      - NQ
      - YM

  VolatilityRegime:
    enabled: true
    priority: 1
    description: "Regime-based strategy switching based on VIX levels"
    parameters:
      symbols:
        - SPY
        - QQQ
        - AAPL
        - MSFT
        - GOOGL
        - AMZN
        - TSLA
        - META
      vix_symbol: "^VIX"
      vix_lookback: 20
      vix_bull_threshold: 15.0
      vix_bear_threshold: 25.0
      momentum_lookback: 20
      momentum_top_n: 5
      rsi_period: 14
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      max_position_pct: 0.05
      reduce_exposure_bear: 0.3

  SimpleMomentum:
    enabled: false
    priority: 2
    description: "Cross-sectional momentum - long top decile, short bottom decile"
    parameters:
      symbols:
        - SPY
        - QQQ
        - AAPL
        - MSFT
        - GOOGL
        - AMZN
        - TSLA
        - META
        - NVDA
        - JPM
      momentum_lookback: 20
      holding_period: 21
      top_pct: 0.1
      bottom_pct: 0.1
      max_position_pct: 0.05
