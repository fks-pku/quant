strategy:
  name: VolatilityRegime
  enabled: true
  priority: 1

parameters:
  symbols: [SPY, QQQ, AAPL, MSFT, GOOGL, AMZN, TSLA, META]
  vix_symbol: ^VIX
  vix_lookback: 20
  vix_bull_threshold: 15.0
  vix_bear_threshold: 25.0
  momentum_lookback: 20
  momentum_top_n: 5
  rsi_period: 14
  rsi_oversold: 30.0
  rsi_overbought: 70.0
  max_position_pct: 0.05
  reduce_exposure_bear: 0.3
