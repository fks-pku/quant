research:
  auto_run: false
  interval_days: 7
  sources:
    - arxiv
    - ssrn
  max_results_per_source: 10
  evaluation_threshold: 6.0
  backtest_sharpe_threshold: 0.5
  auto_backtest: true
  default_backtest_start: "2020-01-01"
  default_backtest_end: "2024-12-31"
  default_symbols:
    - AAPL
    - MSFT
    - GOOGL
    - SPY
    - QQQ

llm:
  provider: minimax  # openai | claude | ollama | minimax
  model: MiniMax-M2.7
  # api_key: Set via MINIMAX_API_KEY environment variable
  # Or uncomment and set directly (not recommended for security):
  # api_key: "..."
  temperature: 0.3
  # base_url: "https://api.minimax.chat/v1"  # Optional: custom endpoint
  # group_id: Set via MINIMAX_GROUP_ID env var for MiniMax
